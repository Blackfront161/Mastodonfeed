name: Social Media Bot

on:
  schedule:
    - cron: "0 */2 * * *" # Startet automatisch alle 2 Stunden
  workflow_dispatch: # Erlaubt dir, den Bot manuell zu testen

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Python vorbereiten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Bot ausführen
        env:
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: python social_bot.py

      - name: Gedächtnis speichern (gepostet.txt)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add gepostet.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Historie aktualisiert" && git push)
